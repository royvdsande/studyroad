<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examen-dashboard · V5c</title>
  <meta name="description" content="Persoonlijk examen-dashboard: proefwerkweek 3, V6-vooruitblik en cijfers — met voortgang, planning en speelse animaties." />
  <meta name="theme-color" content="#221f1b" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23221f1b'/%3E%3Ctext x='50' y='68' font-family='Bricolage Grotesque,Arial,sans-serif' font-size='52' font-weight='800' fill='%23fffdf9' text-anchor='middle'%3EP3%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
/* =================================================================
   PROEFWERK-DASHBOARD — design system
   Warm editorial dashboard · dark rail · paper canvas
   ================================================================= */
:root {
  /* Canvas */
  --bg: #f5f1e9;
  --bg-2: #efe9dd;
  --paper: #fffdf9;
  --paper-2: #faf6ee;

  /* Ink */
  --ink: #221f1b;
  --ink-2: #2f2b25;
  --ink-soft: #6b645b;
  --ink-faint: #9a9286;
  --ink-rail: #cfc6b6;        /* muted text on dark rail */
  --ink-rail-faint: #8d8576;

  --line: #e6dfd1;
  --line-2: #d8cfbd;
  --line-rail: rgba(255,253,249,0.1);

  /* Accents (plat) */
  --tomato: oklch(0.62 0.17 32);
  --gold:   oklch(0.72 0.13 80);
  --teal:   oklch(0.6 0.13 200);

  /* Status semantiek */
  --pass: oklch(0.58 0.13 150);
  --fail: oklch(0.58 0.18 28);
  --st-done:   oklch(0.58 0.13 150);
  --st-plan:   #6b645b;
  --st-move:   oklch(0.62 0.14 65);
  --st-decide: oklch(0.62 0.17 32);
  --st-defer:  oklch(0.58 0.12 250);

  --shadow-sm: 0 1px 2px rgba(34,31,27,0.05), 0 1px 1px rgba(34,31,27,0.04);
  --shadow-md: 0 4px 16px rgba(34,31,27,0.07), 0 1px 4px rgba(34,31,27,0.05);
  --shadow-lg: 0 18px 44px rgba(34,31,27,0.12), 0 4px 12px rgba(34,31,27,0.06);

  --r-sm: 9px;
  --r-md: 13px;
  --r-lg: 18px;

  --ff-display: "Bricolage Grotesque", system-ui, sans-serif;
  --ff-body: "Hanken Grotesk", system-ui, sans-serif;
  --ff-mono: "Space Mono", ui-monospace, monospace;

  --rail-w: 256px;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  line-height: 1.45;
}
::selection { background: var(--gold); color: var(--ink); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
h1, h2, h3 { margin: 0; }

/* =====================  SHELL  ===================== */
.shell { display: grid; grid-template-columns: var(--rail-w) 1fr; min-height: 100vh; }

/* =====================  RAIL  ===================== */
.rail {
  background: var(--ink); color: var(--ink-rail);
  position: sticky; top: 0; align-self: start; height: 100vh;
  display: flex; flex-direction: column; padding: 22px 16px;
  border-right: 1px solid #000;
}
.rail-brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 22px; }
.rail-mark {
  width: 42px; height: 42px; border-radius: 11px; flex: none;
  background: var(--paper); color: var(--ink);
  display: grid; place-items: center;
  font-family: var(--ff-display); font-weight: 800; font-size: 18px;
  transform: rotate(-4deg);
}
.rail-brand b { font-family: var(--ff-display); font-size: 17px; color: var(--paper); letter-spacing: -0.01em; display: block; }
.rail-brand span { font-size: 12px; color: var(--ink-rail-faint); }

.rail-nav { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.rail-nav .seclabel { font-size: 10.5px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-rail-faint); padding: 16px 10px 7px; }
.rail-link {
  display: flex; align-items: center; gap: 12px; padding: 10px 11px; border-radius: 10px;
  font-size: 14px; font-weight: 600; color: var(--ink-rail); text-align: left;
  transition: background 0.14s ease, color 0.14s ease;
}
.rail-link svg { width: 18px; height: 18px; flex: none; opacity: 0.85; }
.rail-link .lk-badge {
  margin-left: auto; font-family: var(--ff-mono); font-size: 11px; font-weight: 700;
  background: rgba(255,253,249,0.1); color: var(--ink-rail); padding: 1px 7px; border-radius: 999px;
}
.rail-link:hover { background: rgba(255,253,249,0.06); color: var(--paper); }
.rail-link[data-on="true"] { background: var(--paper); color: var(--ink); }
.rail-link[data-on="true"] svg { opacity: 1; }
.rail-link[data-on="true"] .lk-badge { background: var(--ink); color: var(--paper); }
.rail-link[data-on="true"][data-alert="true"] .lk-badge { background: var(--st-decide); color: #fff; }

.rail-foot { margin-top: auto; padding: 14px 8px 0; border-top: 1px solid var(--line-rail); }
.rail-foot .meta { font-size: 11.5px; color: var(--ink-rail-faint); line-height: 1.5; }
.rail-reset {
  margin-top: 12px; width: 100%; font-size: 12px; color: var(--ink-rail); font-weight: 600;
  border: 1px solid var(--line-rail); border-radius: 9px; padding: 8px; transition: all 0.14s ease;
}
.rail-reset:hover { border-color: var(--tomato); color: #fff; background: color-mix(in oklab, var(--tomato) 60%, transparent); }

/* =====================  MAIN  ===================== */
.main { min-width: 0; padding: 0 0 60px; }
.page { max-width: 1140px; margin: 0 auto; padding: 0 34px; }

.viewbar {
  position: sticky; top: 0; z-index: 30;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
}
.viewbar-in { max-width: 1140px; margin: 0 auto; padding: 20px 34px 18px; display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
.viewbar h1 { font-family: var(--ff-display); font-size: 27px; letter-spacing: -0.02em; line-height: 1; }
.viewbar .sub { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }
.viewbar .spacer { flex: 1; }

.section-pad { padding-top: 26px; }

/* =====================  KPI TILES  ===================== */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.kpi {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 16px 17px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.kpi .k { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.kpi .v { font-family: var(--ff-display); font-size: 36px; line-height: 1; margin-top: 10px; font-variant-numeric: tabular-nums; }
.kpi .v small { font-size: 18px; color: var(--ink-faint); font-weight: 600; }
.kpi .sub { font-size: 12px; color: var(--ink-faint); margin-top: 6px; line-height: 1.35; }
.kpi.dark { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.kpi.dark .k { color: var(--gold); }
.kpi.dark .sub { color: rgba(255,253,249,0.62); }
.kpi.alert { background: color-mix(in oklab, var(--st-decide) 9%, var(--paper)); border-color: color-mix(in oklab, var(--st-decide) 30%, var(--line)); }
.kpi.alert .v { color: var(--st-decide); }

/* =====================  ALERT BANNERS  ===================== */
.alerts { display: grid; gap: 12px; margin-top: 16px; }
.alert-card {
  display: flex; gap: 14px; align-items: flex-start; padding: 15px 17px;
  border-radius: var(--r-md); border: 1px solid var(--line); background: var(--paper); box-shadow: var(--shadow-sm);
}
.alert-card .ic { width: 34px; height: 34px; border-radius: 9px; flex: none; display: grid; place-items: center; }
.alert-card .ic svg { width: 19px; height: 19px; }
.alert-card .at { font-family: var(--ff-display); font-size: 15.5px; letter-spacing: -0.01em; }
.alert-card .ad { font-size: 13.5px; color: var(--ink-soft); margin-top: 3px; max-width: 78ch; }
.alert-card .ad b { color: var(--ink); font-weight: 700; }
.alert-card[data-kind="operatie"] { background: color-mix(in oklab, var(--st-decide) 7%, var(--paper)); border-color: color-mix(in oklab, var(--st-decide) 26%, var(--line)); }
.alert-card[data-kind="operatie"] .ic { background: color-mix(in oklab, var(--st-decide) 16%, var(--paper)); color: var(--st-decide); }
.alert-card[data-kind="weer"] { background: color-mix(in oklab, var(--st-move) 10%, var(--paper)); border-color: color-mix(in oklab, var(--st-move) 30%, var(--line)); }
.alert-card[data-kind="weer"] .ic { background: color-mix(in oklab, var(--st-move) 18%, var(--paper)); color: oklch(0.5 0.12 60); }

/* =====================  SECTION HEADER  ===================== */
.sec-head { display: flex; align-items: center; gap: 13px; margin: 34px 0 15px; }
.sec-head h2 { font-family: var(--ff-display); font-size: 19px; letter-spacing: -0.01em; }
.sec-head .hr { flex: 1; height: 1px; background: var(--line); }
.sec-head .count { font-size: 12.5px; color: var(--ink-faint); font-family: var(--ff-mono); }

/* =====================  STATUS BADGE  ===================== */
.sbadge {
  display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700;
  padding: 4px 9px 4px 8px; border-radius: 999px; line-height: 1; white-space: nowrap;
  letter-spacing: 0.01em;
}
.sbadge .pip { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.sbadge[data-s="gemaakt"]    { background: color-mix(in oklab, var(--st-done) 14%, var(--paper)); color: var(--st-done); }
.sbadge[data-s="gepland"]    { background: var(--bg-2); color: var(--ink-soft); }
.sbadge[data-s="verplaatst"] { background: color-mix(in oklab, var(--st-move) 18%, var(--paper)); color: oklch(0.48 0.12 60); }
.sbadge[data-s="beslissen"]  { background: color-mix(in oklab, var(--st-decide) 14%, var(--paper)); color: var(--st-decide); }
.sbadge[data-s="uitgesteld"] { background: color-mix(in oklab, var(--st-defer) 13%, var(--paper)); color: var(--st-defer); }
.sbadge[data-s="gemaakt"] .pip    { background: var(--st-done); }
.sbadge[data-s="gepland"] .pip    { background: var(--ink-faint); }
.sbadge[data-s="verplaatst"] .pip { background: var(--st-move); }
.sbadge[data-s="beslissen"] .pip  { background: var(--st-decide); }
.sbadge[data-s="uitgesteld"] .pip { background: var(--st-defer); }

/* =====================  AGENDA (planning lijst)  ===================== */
.agenda { display: flex; flex-direction: column; }
.agenda-day { display: grid; grid-template-columns: 116px 1fr; gap: 22px; padding: 16px 0; border-top: 1px solid var(--line); }
.agenda-day:first-child { border-top: none; }
.agenda-date .dn { font-family: var(--ff-display); font-size: 30px; line-height: 0.9; }
.agenda-date .dl { font-size: 12.5px; color: var(--ink-soft); text-transform: capitalize; margin-top: 4px; }
.agenda-date .today { display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; background: var(--tomato); padding: 3px 8px; border-radius: 999px; }
.agenda-items { display: flex; flex-direction: column; gap: 9px; min-width: 0; }
.agenda-row {
  display: grid; grid-template-columns: 46px 1fr auto; gap: 14px; align-items: center;
  background: var(--paper); border: 1px solid var(--line); border-left: 4px solid var(--c);
  border-radius: var(--r-sm); padding: 12px 15px; box-shadow: var(--shadow-sm);
  cursor: pointer; transition: transform 0.14s ease, box-shadow 0.14s ease; text-align: left; width: 100%;
}
.agenda-row:hover { transform: translateX(3px); box-shadow: var(--shadow-md); }
.agenda-row .ab { width: 36px; height: 36px; border-radius: 9px; background: var(--c); color: #fff; display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 14px; flex: none; }
.agenda-row .an { font-family: var(--ff-display); font-size: 16px; letter-spacing: -0.01em; }
.agenda-row .am { font-size: 12px; color: var(--ink-soft); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.agenda-row .am .mono { font-family: var(--ff-mono); font-size: 11.5px; }
.agenda-row .am .strike { text-decoration: line-through; color: var(--ink-faint); }
.agenda-right { display: flex; align-items: center; gap: 12px; justify-self: end; }
.agenda-right .prog { display: flex; align-items: center; gap: 8px; }
.agenda-right .prog .mini { width: 64px; height: 7px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
.agenda-right .prog .mini i { display: block; height: 100%; background: var(--c); border-radius: 999px; }
.agenda-right .prog small { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-soft); min-width: 30px; text-align: right; }
.agenda-unplanned { margin-top: 4px; }
.agenda-unplanned .uhead { font-size: 12px; font-family: var(--ff-mono); color: var(--st-decide); padding: 8px 0 10px; display: flex; align-items: center; gap: 8px; }

/* =====================  SUBJECT CARD (studie)  ===================== */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; align-items: start; }
.card {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column;
  transition: box-shadow 0.16s ease;
}
.card:hover { box-shadow: var(--shadow-md); }
.card.is-done { opacity: 0.96; }
.card-top { display: flex; gap: 13px; padding: 16px 17px 12px; align-items: flex-start; }
.card-badge { width: 44px; height: 44px; flex: none; border-radius: 12px; background: var(--c); color: #fff; display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 17px; }
.card-head { flex: 1; min-width: 0; }
.card-name { font-family: var(--ff-display); font-size: 19px; letter-spacing: -0.01em; }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
.card-meta .mono { font-family: var(--ff-mono); font-size: 11.5px; }
.card-meta .strike { text-decoration: line-through; color: var(--ink-faint); }

/* statusbalk in kaart */
.card-status { margin: 0 17px 12px; padding: 10px 13px; border-radius: 10px; font-size: 12.5px; line-height: 1.4; display: flex; gap: 9px; align-items: flex-start; }
.card-status svg { width: 15px; height: 15px; flex: none; margin-top: 1px; }
.card-status[data-s="verplaatst"] { background: color-mix(in oklab, var(--st-move) 11%, var(--paper)); color: oklch(0.46 0.1 60); }
.card-status[data-s="beslissen"]  { background: color-mix(in oklab, var(--st-decide) 9%, var(--paper)); color: color-mix(in oklab, var(--st-decide) 78%, var(--ink)); }
.card-status[data-s="gepland"]    { background: var(--bg-2); color: var(--ink-soft); }
.card-status[data-s="gemaakt"]    { background: color-mix(in oklab, var(--st-done) 10%, var(--paper)); color: color-mix(in oklab, var(--st-done) 72%, var(--ink)); }

/* prognose mini */
.prog-mini { display: flex; align-items: center; gap: 12px; margin: 0 17px 12px; padding: 10px 13px; border-radius: 11px; border: 1px solid var(--line); }
.prog-mini .pn { font-family: var(--ff-display); font-size: 24px; line-height: 1; flex: none; font-variant-numeric: tabular-nums; min-width: 1.7em; text-align: center; }
.prog-mini .pl { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
.prog-mini .pt { font-size: 12px; color: var(--ink-soft); line-height: 1.35; }
.prog-mini[data-t="veilig"] { background: color-mix(in oklab, var(--pass) 8%, var(--paper)); border-color: color-mix(in oklab, var(--pass) 24%, var(--line)); }
.prog-mini[data-t="veilig"] .pn, .prog-mini[data-t="veilig"] .pl { color: var(--pass); }
.prog-mini[data-t="doel"] { background: color-mix(in oklab, var(--gold) 14%, var(--paper)); border-color: color-mix(in oklab, var(--gold) 32%, var(--line)); }
.prog-mini[data-t="doel"] .pn, .prog-mini[data-t="doel"] .pl { color: oklch(0.5 0.11 75); }
.prog-mini[data-t="onzeker"] { background: var(--bg-2); }
.prog-mini[data-t="onzeker"] .pn, .prog-mini[data-t="onzeker"] .pl { color: var(--ink-soft); }

/* checklist */
.checklist { list-style: none; margin: 0; padding: 2px 15px 4px; display: flex; flex-direction: column; gap: 2px; }
.check { display: flex; align-items: flex-start; gap: 11px; padding: 8px; border-radius: 9px; cursor: pointer; transition: background 0.12s ease; text-align: left; width: 100%; }
.check:hover { background: var(--bg-2); }
.box { width: 20px; height: 20px; flex: none; border-radius: 6px; margin-top: 1px; border: 2px solid var(--line-2); display: grid; place-items: center; transition: all 0.14s ease; }
.box svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.5); transition: all 0.14s ease; }
.check[data-on="true"] .box { background: var(--c); border-color: var(--c); }
.check[data-on="true"] .box svg { opacity: 1; transform: scale(1); }
.check-label { font-size: 14px; line-height: 1.35; }
.check[data-on="true"] .check-label { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--line-2); }

.tip { font-size: 12px; color: var(--ink-soft); background: var(--bg-2); border-radius: 9px; padding: 9px 11px; margin: 4px 17px 0; display: flex; gap: 8px; line-height: 1.4; }
.tip svg { width: 14px; height: 14px; flex: none; margin-top: 1px; color: var(--ink-faint); }

/* card footer */
.card-foot { margin-top: auto; padding: 12px 17px 15px; border-top: 1px solid var(--line); }
.bar { height: 7px; border-radius: 999px; background: var(--bg-2); overflow: hidden; }
.bar > i { display: block; height: 100%; background: var(--c); border-radius: 999px; transition: width 0.4s cubic-bezier(0.2,0.8,0.2,1); }
.foot-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; font-size: 12px; }
.foot-row b { font-family: var(--ff-mono); font-size: 12px; }
.note-toggle { margin-top: 11px; font-size: 12px; color: var(--ink-soft); display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
.note-toggle:hover { color: var(--ink); }
.note-box { margin-top: 10px; }
.note-box textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; background: var(--paper-2); padding: 10px 12px; font: inherit; font-size: 13px; resize: vertical; min-height: 60px; color: var(--ink); outline: none; }
.note-box textarea:focus { border-color: var(--line-2); }

/* =====================  STATUS-CONTROL (per toets)  ===================== */
.statusctl { margin: 0 17px 14px; }
.statusctl .sc-q { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink-faint); margin-bottom: 7px; }
.statusctl[data-open="true"] { background: color-mix(in oklab, var(--st-decide) 7%, var(--paper)); border: 1px solid color-mix(in oklab, var(--st-decide) 26%, var(--line)); border-radius: 11px; padding: 11px 12px; }
.statusctl[data-open="true"] .sc-q { color: var(--st-decide); font-weight: 800; text-transform: uppercase; }
.sc-seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.sc-seg button {
  display: flex; flex-direction: column; gap: 1px; align-items: flex-start; text-align: left;
  border: 1px solid var(--line); border-radius: 9px; padding: 8px 9px; background: var(--paper-2);
  transition: all 0.14s ease;
}
.sc-seg button b { font-size: 12.5px; font-weight: 700; }
.sc-seg button span { font-size: 10.5px; color: var(--ink-faint); }
.sc-seg button:hover { border-color: var(--line-2); }
.sc-seg button[data-on="true"] span { color: inherit; opacity: 0.78; }
.sc-seg button[data-on="true"][data-v="nu"]        { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.sc-seg button[data-on="true"][data-v="gemaakt"]   { background: color-mix(in oklab, var(--st-done) 14%, var(--paper)); border-color: var(--st-done); color: color-mix(in oklab, var(--st-done) 68%, var(--ink)); }
.sc-seg button[data-on="true"][data-v="uitstellen"]{ background: color-mix(in oklab, var(--st-defer) 13%, var(--paper)); border-color: var(--st-defer); color: color-mix(in oklab, var(--st-defer) 66%, var(--ink)); }

/* =====================  V6 VIEW  ===================== */
.v6-intro { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px 18px; box-shadow: var(--shadow-sm); display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
.v6-intro .lead { flex: 1; min-width: 240px; }
.v6-intro .lead p { margin: 6px 0 0; font-size: 13px; color: var(--ink-soft); max-width: 60ch; }
.v6-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--ink-soft); }
.v6-legend span { display: inline-flex; align-items: center; gap: 6px; }
.v6-legend .sw { width: 10px; height: 10px; border-radius: 3px; }

.v6-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; align-items: start; }
.v6-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-sm); overflow: hidden; }
.v6-card-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
.v6-card-top .vb { width: 38px; height: 38px; border-radius: 10px; background: var(--c); color: #fff; display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 15px; flex: none; }
.v6-card-top .vn { font-family: var(--ff-display); font-size: 17px; letter-spacing: -0.01em; }
.v6-card-top .vw { margin-left: auto; text-align: right; }
.v6-card-top .vw b { font-family: var(--ff-display); font-size: 17px; white-space: nowrap; }
.v6-card-top .vw span { display: block; font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; }
.v6-toets { padding: 12px 16px; border-top: 1px solid var(--line); }
.v6-toets:first-of-type { border-top: none; }
.v6-toets-head { display: flex; align-items: center; gap: 9px; }
.v6-moment { font-family: var(--ff-mono); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.02em; white-space: nowrap; }
.v6-moment[data-m="per1"], .v6-moment[data-m="per2"] { background: var(--bg-2); color: var(--ink-soft); }
.v6-moment[data-m="pwwk1"], .v6-moment[data-m="pwwk2"] { background: color-mix(in oklab, var(--c) 16%, var(--paper)); color: color-mix(in oklab, var(--c) 62%, var(--ink)); }
.v6-toets-head .vt-soort { font-size: 12px; color: var(--ink-soft); }
.v6-toets-head .vt-soort .dur { font-family: var(--ff-mono); font-size: 11px; }
.v6-toets-head .vt-wf { margin-left: auto; font-family: var(--ff-mono); font-size: 13px; font-weight: 700; }
.v6-toets-head .vt-wf.hand { color: var(--ink-faint); font-size: 11px; }
.v6-stof { font-size: 12.5px; color: var(--ink-soft); margin-top: 7px; line-height: 1.45; }
.v6-nh { display: inline-block; margin-top: 6px; font-size: 10.5px; font-weight: 700; color: var(--st-decide); background: color-mix(in oklab, var(--st-decide) 11%, var(--paper)); padding: 2px 7px; border-radius: 5px; }
.v6-defer-note { margin: 0 16px 14px; font-size: 12px; color: var(--st-defer); background: color-mix(in oklab, var(--st-defer) 9%, var(--paper)); border-radius: 8px; padding: 8px 11px; display: flex; gap: 7px; align-items: center; }

/* =====================  V6 — UITGEWERKT  ===================== */
.v6-kpis { margin-top: 16px; }

/* ---- vakkaart: hover-lift + badge-tik + weging-meter ---- */
.v6-card { transition: box-shadow 0.18s ease, transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1); }
.v6-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.v6-card-top .vb { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
.v6-card:hover .vb { transform: rotate(-7deg) scale(1.07); }

.v6-weeg { display: flex; gap: 2px; padding: 10px 16px 12px; }
.v6-weeg-seg {
  height: 8px; border-radius: 3px; min-width: 6px; flex-basis: 0;
  background: color-mix(in oklab, var(--c) 78%, var(--paper));
  transform-origin: left center; animation: v6-weeg-in 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  transition: transform 0.16s ease, filter 0.16s ease;
}
.v6-weeg-seg[data-m="per1"], .v6-weeg-seg[data-m="per2"] { background: color-mix(in oklab, var(--c) 38%, var(--paper)); }
.v6-weeg:hover .v6-weeg-seg { filter: saturate(1.15); }
.v6-weeg-seg:hover { transform: scaleY(1.5); }

/* ---- moment-filter: dimmen / oplichten van losse toetsen ---- */
.v6-toets { transition: opacity 0.3s ease, filter 0.3s ease, background 0.25s ease, transform 0.25s ease; }
.v6-toets[data-dim="true"] { opacity: 0.32; filter: grayscale(0.55); }
.v6-toets[data-hot="true"] {
  background: color-mix(in oklab, var(--c) 7%, var(--paper));
  box-shadow: inset 3px 0 0 var(--c);
}
.count.is-filter {
  color: var(--ink); font-weight: 700; background: var(--bg-2);
  border: 1px solid var(--line-2); border-radius: 999px; padding: 3px 11px;
  animation: fx-badge-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* ---- jaarlijn ---- */
.v6-timeline {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  box-shadow: var(--shadow-sm); padding: 18px 22px 16px; margin-top: 18px;
  animation: fx-rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both; animation-delay: 0.08s;
}
.v6tl-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
.v6tl-title { font-family: var(--ff-display); font-size: 16px; letter-spacing: -0.01em; }
.v6tl-sub { font-size: 12px; color: var(--ink-soft); margin-top: 3px; max-width: 66ch; line-height: 1.5; }
.v6tl-sub b { color: var(--ink); font-weight: 700; }
.v6tl-clear {
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; flex: none;
  font-size: 11.5px; font-weight: 700; color: var(--ink-soft);
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px;
  transition: all 0.14s ease; animation: fx-badge-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.v6tl-clear:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.v6tl-track {
  position: relative; display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 8px;
}
.v6tl-track::after {
  content: ""; position: absolute; left: 4px; right: 4px; top: 156px; height: 2px; border-radius: 2px;
  background: linear-gradient(90deg, transparent, var(--line-2) 12%, var(--line-2) 88%, transparent);
}
.v6tl-col {
  display: flex; flex-direction: column; align-items: center; padding: 0;
  background: none; cursor: pointer; transition: transform 0.16s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.25s ease, filter 0.25s ease;
}
.v6tl-col:hover { transform: translateY(-3px); }
.v6tl-col[data-dim="true"] { opacity: 0.42; filter: grayscale(0.45); }
.v6tl-bar-wrap {
  position: relative; height: 156px; width: 100%; padding-top: 22px;
  display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
}
.v6tl-tot { position: absolute; top: 0; left: 0; right: 0; text-align: center; line-height: 1; }
.v6tl-tot b { font-family: var(--ff-display); font-size: 15px; }
.v6tl-tot small { font-size: 10px; color: var(--ink-faint); margin-left: 1px; }
.v6tl-bar {
  width: min(62px, 72%); display: flex; flex-direction: column-reverse;
  border-radius: 8px 8px 3px 3px; overflow: hidden;
  transform-origin: bottom center; box-shadow: 0 2px 9px rgba(34, 31, 27, 0.09);
  animation: v6tl-grow 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; animation-delay: var(--delay);
  transition: box-shadow 0.18s ease;
}
.v6tl-col:hover .v6tl-bar { box-shadow: 0 7px 18px rgba(34, 31, 27, 0.16); }
.v6tl-col[data-on="true"] .v6tl-bar { box-shadow: 0 0 0 2px var(--ink), 0 7px 18px rgba(34, 31, 27, 0.18); }
.v6tl-seg {
  display: block; width: 100%; background: var(--c); flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255, 253, 249, 0.55);
  opacity: 0; animation: v6tl-seg-in 0.4s ease both; animation-delay: var(--seg-delay);
}
.v6tl-seg[data-hand="true"] {
  background: repeating-linear-gradient(45deg, color-mix(in oklab, var(--c) 55%, var(--paper)) 0 3px, color-mix(in oklab, var(--c) 18%, var(--paper)) 3px 6px);
}
.v6tl-node { margin-top: -7px; z-index: 1; }
.v6tl-node .dot {
  display: block; width: 14px; height: 14px; border-radius: 50%;
  background: var(--paper); border: 2px solid var(--line-2);
  box-shadow: 0 1px 3px rgba(34, 31, 27, 0.12); transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.v6tl-node .dot[data-season="najaar"]   { border-color: var(--gold); }
.v6tl-node .dot[data-season="winter"]   { border-color: var(--teal); }
.v6tl-node .dot[data-season="voorjaar"] { border-color: var(--st-done); }
.v6tl-col:hover .v6tl-node .dot,
.v6tl-col[data-on="true"] .v6tl-node .dot { transform: scale(1.4); }
.v6tl-meta { margin-top: 11px; text-align: center; }
.v6tl-meta b { display: block; font-family: var(--ff-display); font-size: 13px; }
.v6tl-meta span { font-size: 10.5px; color: var(--ink-faint); }
.v6tl-legend { display: flex; flex-wrap: wrap; gap: 7px 13px; margin-top: 16px; padding-top: 13px; border-top: 1px dashed var(--line); }
.v6tl-key { display: inline-flex; align-items: center; gap: 5px; font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-soft); }
.v6tl-key .sw { width: 9px; height: 9px; border-radius: 3px; flex: none; }

@keyframes v6tl-grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
@keyframes v6tl-seg-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes v6-weeg-in { from { transform: scaleX(0); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }

/* =====================  CIJFERS  ===================== */
.gr-list { display: flex; flex-direction: column; gap: 11px; }
.gr-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow 0.16s ease; }
.gr-card:hover { box-shadow: var(--shadow-md); }
.gr-main { display: grid; grid-template-columns: 44px 1.1fr 1.5fr auto; gap: 18px; align-items: center; padding: 14px 17px; cursor: pointer; width: 100%; text-align: left; }
.gr-badge { width: 44px; height: 44px; border-radius: 12px; background: var(--c); color: #fff; display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 16px; }
.gr-name { font-family: var(--ff-display); font-size: 18px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.gr-name .full { display: block; flex-basis: 100%; font-family: var(--ff-body); font-size: 12px; color: var(--ink-faint); font-weight: 400; margin-top: 1px; }
.gr-tag { font-family: var(--ff-body); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; line-height: 1.3; white-space: nowrap; }
.gr-tag.t-veilig { background: color-mix(in oklab, var(--pass) 13%, var(--paper)); color: var(--pass); }
.gr-tag.t-doel { background: color-mix(in oklab, var(--gold) 24%, var(--paper)); color: oklch(0.48 0.11 75); }
.gr-tag.t-onzeker { background: var(--bg-2); color: var(--ink-soft); }
.gr-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.gchip { display: inline-flex; flex-direction: column; align-items: center; min-width: 38px; padding: 5px 8px; border-radius: 8px; line-height: 1.1; background: var(--bg-2); border: 1px solid var(--line); }
.gchip b { font-family: var(--ff-mono); font-size: 13px; font-weight: 700; }
.gchip small { font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); margin-top: 1px; }
.gchip[data-fail="true"] { background: color-mix(in oklab, var(--fail) 11%, var(--paper)); border-color: color-mix(in oklab, var(--fail) 32%, var(--line)); }
.gchip[data-fail="true"] b { color: var(--fail); }
.gr-avg { display: flex; align-items: center; gap: 13px; justify-self: end; }
.avg-num { font-family: var(--ff-display); font-size: 32px; line-height: 1; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
.avg-num.pass { color: var(--pass); }
.avg-num.fail { color: var(--fail); }
.avg-num.none { color: var(--ink-faint); font-size: 17px; }
.gr-arrow { color: var(--ink-faint); transition: transform 0.2s ease; }
.gr-card[data-open="true"] .gr-arrow { transform: rotate(90deg); }
.gr-detail { padding: 2px 17px 17px; border-top: 1px solid var(--line); }
.gr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.gr-table th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); font-weight: 700; padding: 10px 8px 7px; }
.gr-table td { padding: 8px; border-top: 1px solid var(--line); }
.gr-table td.c { font-family: var(--ff-mono); font-weight: 700; }
.gr-table .typ { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: var(--bg-2); color: var(--ink-soft); }
.barline { display: flex; align-items: center; gap: 10px; margin: 12px 0 4px; }
.barline .track { flex: 1; height: 9px; background: var(--bg-2); border-radius: 999px; position: relative; }
.barline .track > i { display: block; height: 100%; border-radius: 999px; }
.barline .track .thr { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink-faint); border-radius: 2px; }
.barline .lab { font-size: 11px; color: var(--ink-soft); font-family: var(--ff-mono); }
.prog-mini.detail { margin: 2px 0 12px; }
.gr-sort { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
.gr-sort button { padding: 7px 13px; border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--ink-soft); }
.gr-sort button[data-on="true"] { background: var(--paper); color: var(--ink); box-shadow: var(--shadow-sm); }
.note-frans { font-size: 12.5px; color: var(--ink-soft); background: var(--bg-2); border-radius: 9px; padding: 9px 12px; margin-top: 4px; white-space: pre-line; line-height: 1.5; }

/* =====================  EINDEXAMENS (CE)  ===================== */
.ce-banner {
  display: flex; gap: 14px; align-items: flex-start; padding: 16px 18px;
  border-radius: var(--r-md); border: 1px solid var(--line);
  background: linear-gradient(120deg, var(--paper), color-mix(in oklab, var(--gold) 8%, var(--paper)));
  box-shadow: var(--shadow-sm); margin-bottom: 16px;
}
.ce-banner .ic { width: 36px; height: 36px; border-radius: 10px; flex: none; display: grid; place-items: center; background: color-mix(in oklab, var(--gold) 22%, var(--paper)); color: oklch(0.46 0.11 75); }
.ce-banner .ic svg { width: 19px; height: 19px; }
.ce-banner .at { font-family: var(--ff-display); font-size: 15.5px; letter-spacing: -0.01em; }
.ce-banner .ad { font-size: 13px; color: var(--ink-soft); margin-top: 3px; max-width: 80ch; line-height: 1.5; }
.ce-banner .ad b { color: var(--ink); font-weight: 700; }

.ce-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; align-items: stretch; }
.ce-card {
  display: flex; align-items: center; gap: 13px; position: relative; overflow: hidden;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  border-left: 4px solid var(--c); padding: 13px 15px; box-shadow: var(--shadow-sm);
  transition: transform 0.16s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.16s ease;
}
.ce-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.ce-badge { width: 40px; height: 40px; flex: none; border-radius: 11px; background: var(--c); color: #fff; display: grid; place-items: center; font-family: var(--ff-display); font-weight: 700; font-size: 15px; }
.ce-body { flex: 1; min-width: 0; }
.ce-name { font-family: var(--ff-display); font-size: 16px; letter-spacing: -0.01em; }
.ce-meta { display: flex; flex-wrap: wrap; gap: 3px 10px; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.ce-meta .mono { font-family: var(--ff-mono); font-size: 11.5px; }
.ce-tag {
  position: absolute; top: 9px; right: 11px; font-family: var(--ff-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.06em; color: color-mix(in oklab, var(--c) 64%, var(--ink));
  background: color-mix(in oklab, var(--c) 13%, var(--paper)); padding: 2px 7px; border-radius: 6px;
}

/* CE-banner met aftelteller */
.ce-banner-body { flex: 1; min-width: 220px; }
.ce-count {
  flex: none; align-self: stretch; min-width: 92px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 14px; border-radius: var(--r-sm); line-height: 1.05;
  background: color-mix(in oklab, var(--gold) 16%, var(--paper));
  border: 1px solid color-mix(in oklab, var(--gold) 34%, var(--line));
}
.ce-count b { font-family: var(--ff-display); font-size: 30px; color: oklch(0.46 0.11 75); font-variant-numeric: tabular-nums; }
.ce-count span { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: oklch(0.5 0.1 75); }
.ce-count small { font-size: 10.5px; color: var(--ink-faint); margin-top: 3px; font-family: var(--ff-mono); }

/* CE-kaart: glans-veeg op hover + zacht pulserend CE-label */
.ce-card::before {
  content: ""; position: absolute; top: 0; bottom: 0; left: -60%; width: 45%;
  background: linear-gradient(105deg, transparent, rgba(255, 255, 255, 0.55), transparent);
  transform: skewX(-18deg); opacity: 0; pointer-events: none;
}
.ce-card:hover::before { animation: ce-sheen 0.85s ease; }
.ce-card .ce-badge { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
.ce-card:hover .ce-badge { transform: rotate(-6deg) scale(1.07); }
.ce-card .ce-tag { animation: ce-tag-pulse 3.4s ease-in-out infinite; }
@keyframes ce-sheen { from { left: -60%; opacity: 1; } to { left: 130%; opacity: 1; } }
@keyframes ce-tag-pulse { 0%, 100% { opacity: 0.72; } 50% { opacity: 1; } }

/* =====================  UTIL  ===================== */
.controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 4px 0 0; }
.search { flex: 1; min-width: 200px; max-width: 360px; display: flex; align-items: center; gap: 9px; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 9px 15px; box-shadow: var(--shadow-sm); }
.search input { border: none; outline: none; background: none; font: inherit; flex: 1; color: var(--ink); }
.search input::placeholder { color: var(--ink-faint); }
.foot-note { color: var(--ink-faint); font-size: 12px; margin-top: 34px; display: flex; gap: 14px; flex-wrap: wrap; }
.empty { text-align: center; color: var(--ink-soft); padding: 50px 20px; }
.empty b { font-family: var(--ff-display); font-size: 18px; display: block; color: var(--ink); margin-bottom: 6px; }

/* mobiele rail-toggle (verborgen op desktop) */
.rail-toggle { display: none; }

/* =====================  RESPONSIVE  ===================== */
@media (max-width: 1080px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .shell { grid-template-columns: 1fr; }
  .rail {
    position: sticky; top: 0; height: auto; flex-direction: row; align-items: center;
    padding: 12px 16px; gap: 10px; z-index: 50; flex-wrap: wrap;
  }
  .rail-brand { padding: 0; margin-right: auto; }
  .rail-nav { flex-direction: row; flex-wrap: wrap; margin: 0; gap: 4px; }
  .rail-nav .seclabel { display: none; }
  .rail-link { padding: 8px 11px; }
  .rail-foot { display: none; }
  .page, .viewbar-in { padding-left: 18px; padding-right: 18px; }
  .agenda-day { grid-template-columns: 70px 1fr; gap: 14px; }
  .agenda-row { grid-template-columns: 40px 1fr; }
  .agenda-right { grid-column: 1 / -1; justify-self: start; }
  .gr-main { grid-template-columns: 40px 1fr auto; }
  .gr-chips { display: none; }
}
@media (max-width: 520px) {
  .kpis { grid-template-columns: 1fr 1fr; }
  .viewbar h1 { font-size: 22px; }
  .v6-timeline { padding: 16px 14px 14px; }
  .v6tl-track { gap: 4px; }
  .v6tl-track::after { top: 126px; }
  .v6tl-bar-wrap { height: 126px; padding-top: 20px; }
  .v6tl-bar { width: min(40px, 82%); }
  .v6tl-meta b { font-size: 11.5px; }
  .v6tl-meta span { font-size: 9.5px; }
  .ce-banner { flex-wrap: wrap; }
  .ce-count { align-self: stretch; width: 100%; flex-direction: row; gap: 8px; }
  .ce-count small { margin-top: 0; margin-left: auto; }
}

/* =================================================================
   SPEELSE ANIMATIES & MICRO-INTERACTIES
   ================================================================= */

/* ---- entrance keyframes ---- */
@keyframes fx-rise {
  from { opacity: 0; transform: translateY(14px) scale(0.985); }
  to   { opacity: 1; transform: none; }
}
@keyframes fx-fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes fx-pop {
  0%   { transform: scale(0.4); }
  55%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}
@keyframes fx-check-pop {
  0%   { transform: scale(0.2) rotate(-12deg); opacity: 0; }

  60% { transform: scale(1.3); }

  100% { background-position: -200% 0; }

.viewbar h1 { animation: fx-rise 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

(function () {

    "#e8643c", "#f0b429", "#3a9d8e", "#5b6fd6",
    "#d6477f", "#62b85a", "#9b59c6", "#f4a261",
    "#ef476f", "#06d6a0", "#ffd166", "#118ab2",

        x: x, y: y,

      </div>

      <div className="sec-head">
        <h2>Planning</h2>
        <div className="hr" />
        <span className="count">{actief.filter((s) => s.datum).length} ingepland</span>
      </div>
      <Agenda subjects={SUBJECTS} done={done} besluiten={besluiten} onOpen={(id) => {
        const el = cardRefs.current[id];
        if (el) { window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: "smooth" }); el.animate([{ boxShadow: "0 0 0 0 var(--gold)" }, { boxShadow: "0 0 0 3px var(--gold)" }, { boxShadow: "0 0 0 0 transparent" }], { duration: 900 }); }
      }} />

      {teBeslissen.length > 0 && (
        <div className="agenda-unplanned">
          <div className="uhead">{Ic.alert({ width: 15, height: 15 })} Nog te beslissen — gemist door operatie, datum onzeker</div>
        </div>
      )}

      <div className="sec-head">
        <h2>Stof & voortgang</h2>
        <div className="hr" />
        <span className="count">{SUBJECTS.length} vakken</span>
      </div>
      <div className="grid">
        {SUBJECTS.map((s, ci) => (
          <div key={s.id} ref={(el) => (cardRefs.current[s.id] = el)} style={{ animationDelay: (ci * 0.05) + "s" }}>
            <SubjectCard
              subj={s} done={done} notes={notes} besluit={besluiten[s.id]}
              onToggle={onToggle} onNote={onNote} onDecide={onDecide}
            />
          </div>
        ))}
      </div>

      <div className="foot-note">
        <span>Samengesteld uit het toetsrooster & PTA · voortgang lokaal bewaard op dit apparaat</span>
      </div>
    </div>
  );
}

// ---------- Rail ----------
function Rail({ view, setView, teBeslissen, onReset }) {
  const items = [
    { id: "pwwk3", label: "Proefwerkweek 3", icon: Ic.cal, badge: teBeslissen ? String(teBeslissen) : null, alert: teBeslissen > 0 },
    { id: "v6", label: "Volgend jaar — V6", icon: Ic.move },
    { id: "cijfers", label: "Cijfers", icon: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 20V10M12 20V4M19 20v-7" /></svg> },
  ];
  return (
    <aside className="rail">
      <div className="rail-brand">
        <div className="rail-mark">P3</div>
        <div>
          <b>Examen-dashboard</b>
          <span>Klas V5c · 2025–2026</span>
        </div>
      </div>
      <nav className="rail-nav">
        <div className="seclabel">Overzicht</div>
        {items.map((it) => (
          <button key={it.id} className="rail-link" data-on={view === it.id} data-alert={it.alert ? "true" : "false"} onClick={() => setView(it.id)}>
            {it.icon()}
            {it.label}
            {it.badge && <span className="lk-badge">{it.badge}</span>}
          </button>
        ))}
      </nav>
      <div className="rail-foot">
        <div className="meta">Proefwerkweek 3<br />di 23 jun — wo 1 jul 2026</div>
        <button className="rail-reset" onClick={onReset}>Voortgang resetten</button>
      </div>
    </aside>
  );
}

const VIEW_META = {
  pwwk3:   { title: "Proefwerkweek 3", sub: "Je rooster, stof en de keuzes rond je operatie & het weer" },
  v6:      { title: "Volgend jaar — V6", sub: "Alle schoolexamentoetsen die volgend jaar nog meetellen" },
  cijfers: { title: "Cijfers", sub: "Je SE-gemiddelde per vak, met prognose richting de eindstreep" },
};

// ---------- App ----------
function CelebrationToast({ onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 7000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="fx-toast" role="status">
      <span className="emoji">🎉</span>
      <div>
        <div className="ft-title">Alles afgevinkt — topper!</div>
        <div className="ft-sub">Je hebt alle onderwerpen van álle vakken geleerd. Succes met de toetsen!</div>
      </div>
      <button className="ft-close" aria-label="Sluiten" onClick={onClose}>{Ic.cross({ width: 15, height: 15 })}</button>
    </div>
  );
}

function App() {
  const [done, setDone] = useState(() => load(LS.done, {}));
  const [notes, setNotes] = useState(() => load(LS.notes, {}));
  const [besluiten, setBesluiten] = useState(() => ({ ...DEFAULT_BESLUIT, ...load(LS.besluit, {}) }));
  const [view, setView] = useState(() => load(LS.view, "pwwk3"));
  const [party, setParty] = useState(false);
  const cardRefs = useRef({});

  useEffect(() => localStorage.setItem(LS.done, JSON.stringify(done)), [done]);
  useEffect(() => localStorage.setItem(LS.notes, JSON.stringify(notes)), [notes]);
  useEffect(() => localStorage.setItem(LS.besluit, JSON.stringify(besluiten)), [besluiten]);
  useEffect(() => localStorage.setItem(LS.view, JSON.stringify(view)), [view]);
  useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);

  const totalTopics = useMemo(() => SUBJECTS.reduce((n, s) => n + s.onderwerpen.length, 0), []);
  const doneTopics = SUBJECTS.reduce((n, s) => n + s.onderwerpen.filter((_, i) => done[`${s.id}::${i}`]).length, 0);
  const allDone = totalTopics > 0 && doneTopics === totalTopics;
  const wasAllDone = useRef(allDone);
  useEffect(() => {
    if (allDone && !wasAllDone.current) {
      if (window.Confetti) { Confetti.cannons(); Confetti.rain(1600); }
      setParty(true);
    }
    wasAllDone.current = allDone;
  }, [allDone]);

  const toggle = (id, i) => setDone((p) => ({ ...p, [`${id}::${i}`]: !p[`${id}::${i}`] }));
  const setNote = (id, v) => setNotes((p) => ({ ...p, [id]: v }));
  const setDecide = (id, v) => setBesluiten((p) => ({ ...p, [id]: v }));

  const teBeslissen = SUBJECTS.filter((s) => effStatus(s, besluiten[s.id]) === "beslissen").length;
  const m = VIEW_META[view];

  return (
    <div className="shell">
      <Rail view={view} setView={setView} teBeslissen={teBeslissen}
        onReset={() => { if (confirm("Vinkjes, notities en keuzes wissen?")) { setDone({}); setNotes({}); setBesluiten({ ...DEFAULT_BESLUIT }); setParty(false); } }} />
      <main className="main">
        <div className="viewbar">
          <div className="viewbar-in">
            <div>
              <h1>{m.title}</h1>
              <div className="sub">{m.sub}</div>
            </div>
          </div>
        </div>
        {view === "pwwk3" && <Pwwk3View done={done} notes={notes} besluiten={besluiten} onToggle={toggle} onNote={setNote} onDecide={setDecide} cardRefs={cardRefs} />}
        {view === "v6" && <V6View besluiten={besluiten} />}
        {view === "cijfers" && <CijfersView />}
      </main>
      {party && <CelebrationToast onClose={() => setParty(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

})();
  </script>
</body>
</html>
