<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — StudyRoad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230c0e14'/%3E%3Cpath d='M7 17C12 17 12 7 17 7' stroke='white' stroke-width='2' stroke-linecap='round' stroke-dasharray='0.2 4'/%3E%3Ccircle cx='7' cy='17' r='2.2' fill='white'/%3E%3Ccircle cx='17' cy='7' r='2.4' fill='%232b5ce6'/%3E%3C/svg%3E" />
  <style> .mark-dest { fill: var(--accent); } </style>
</head>
<body class="auth-body">
  <div class="auth-aurora"></div>
  <div class="auth-top">
    <a class="brand" href="index.html">
      <span class="brand-mark"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M7 17C12 17 12 7 17 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.2 4"/><circle cx="7" cy="17" r="2.2" fill="white"/><circle cx="17" cy="7" r="2.4" class="mark-dest"/></svg></span>
      <span class="brand-name">StudyRoad</span>
    </a>
  </div>

  <div class="auth-main">
    <div class="auth-card">
      <div class="auth-head">
        <h1 id="auth-title">Welcome back</h1>
        <p id="auth-subtitle">Sign in with Google, or use your email and password.</p>
      </div>

      <button class="social-btn" id="google-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or continue with email</span></div>

      <form class="auth-form" id="auth-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <div class="input-icon-wrap">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
            <input class="input" id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="field" id="name-field" style="display:none">
          <label for="name">Full name</label>
          <div class="input-icon-wrap">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
            <input class="input" id="name" name="name" type="text" placeholder="Alex Jansen" autocomplete="name">
          </div>
        </div>

        <div class="field">
          <div class="auth-label-row">
            <label for="password">Password</label>
            <span class="auth-link" id="magic-link">Send magic link</span>
          </div>
          <div class="input-icon-wrap">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input class="input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="input-eye" id="toggle-pw" aria-label="Show password">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="password-hint" id="pw-hint" style="display:none"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>6 or more characters</p>
        </div>

        <button class="btn btn-primary btn-full" id="submit-btn" type="submit" style="height:48px;margin-top:4px">Sign in</button>
      </form>

      <p class="auth-foot" id="auth-foot">Don't have an account? <b id="toggle-mode">Sign up</b></p>
    </div>
  </div>

  <div class="auth-back">
    <a href="index.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>Back to homepage</a>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var mode = new URLSearchParams(location.search).get('mode') === 'signup' ? 'signup' : 'login';
    var els = {
      title: document.getElementById('auth-title'),
      subtitle: document.getElementById('auth-subtitle'),
      nameField: document.getElementById('name-field'),
      submit: document.getElementById('submit-btn'),
      foot: document.getElementById('auth-foot'),
      pwInput: document.getElementById('password'),
      pwHint: document.getElementById('pw-hint'),
      form: document.getElementById('auth-form')
    };
    function render() {
      var signup = mode === 'signup';
      els.title.textContent = signup ? 'Create your account' : 'Welcome back';
      els.subtitle.textContent = signup
        ? 'Start your free study roadmap in under a minute.'
        : 'Sign in with Google, or use your email and password.';
      els.nameField.style.display = signup ? 'flex' : 'none';
      els.submit.textContent = signup ? 'Create account' : 'Sign in';
      els.pwHint.style.display = signup ? 'flex' : 'none';
      els.pwInput.setAttribute('autocomplete', signup ? 'new-password' : 'current-password');
      els.foot.innerHTML = signup
        ? "Already have an account? <b id='toggle-mode'>Sign in</b>"
        : "Don't have an account? <b id='toggle-mode'>Sign up</b>";
      bindToggle();
    }
    function bindToggle() {
      document.getElementById('toggle-mode').addEventListener('click', function () {
        mode = mode === 'signup' ? 'login' : 'signup';
        var u = new URL(location.href); u.searchParams.set('mode', mode); history.replaceState(null, '', u);
        render();
      });
    }
    // Password show/hide
    document.getElementById('toggle-pw').addEventListener('click', function () {
      var t = els.pwInput.type === 'password' ? 'text' : 'password';
      els.pwInput.type = t;
    });
    // Password hint
    els.pwInput.addEventListener('input', function () {
      var ok = els.pwInput.value.length >= 6;
      els.pwHint.classList.toggle('ok', ok);
      els.pwHint.querySelector('svg').innerHTML = ok
        ? '<polyline points="20 6 9 17 4 12"/>'
        : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    });
    // Toast helper
    var toast = document.getElementById('toast');
    function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(function () { toast.classList.remove('show'); }, 1900); }
    // Submit → go to app (prototype)
    els.form.addEventListener('submit', function (e) {
      e.preventDefault();
      els.submit.disabled = true;
      els.submit.textContent = mode === 'signup' ? 'Creating…' : 'Signing in…';
      setTimeout(function () { location.href = 'app.html'; }, 650);
    });
    document.getElementById('google-btn').addEventListener('click', function () {
      this.disabled = true; this.style.opacity = '.6';
      setTimeout(function () { location.href = 'app.html'; }, 650);
    });
    document.getElementById('magic-link').addEventListener('click', function () { showToast('Magic link sent — check your inbox ✉️'); });
    render();
  </script>
  <script src="js/brand.js"></script>
  <script src="js/tweaks.js"></script>
</body>
</html>
