<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitFlow – Sign up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div class="auth-page">
    <a class="auth-logo button-reset" href="/">
      <div class="auth-logo-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4.5V9.5L7 13L1 9.5V4.5L7 1Z" fill="white"/></svg></div>FitFlow
    </a>
    <div class="auth-card">
      <h2>Create your account</h2>
      <p class="auth-sub">Sign up to get your free AI-generated training and nutrition plan.</p>
      <button class="social-btn" id="signup-google" type="button"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Google</button>
      <div class="divider">Or continue with</div>
      <form id="signup-form">
        <div class="field">
          <label>Name</label>
          <div class="field-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="signup-name" type="text" placeholder="John Smith" autocomplete="name">
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <div class="field-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="signup-email" type="email" placeholder="you@example.com" autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="signup-password" type="password" placeholder="At least 6 characters" autocomplete="new-password">
            <svg class="toggle-password" style="cursor:pointer;flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <p class="password-hint" id="signup-password-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            6 or more characters
          </p>
        </div>
        <button class="auth-submit" id="signup-submit" type="submit">Create account</button>
      </form>
      <div id="signup-status" class="auth-status" hidden></div>
      <div class="auth-footer">Already have an account? <a href="/auth/login">Sign in</a></div>
    </div>
    <div class="auth-back">← <a href="/">Back to homepage</a></div>
  </div>
  <script type="module" src="/auth/js/auth-page.js"></script>
</body>
</html>
